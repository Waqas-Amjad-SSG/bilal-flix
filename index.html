<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bilal Flix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0f;
  color: #e5e5e5;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

/* ===== LOCK SCREEN ===== */
.lock-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.lock-screen.hidden { display: none; }
.lock-logo {
  font-size: 2.5rem; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #e50914, #ff6b35);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}
.lock-subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2.5rem; }

/* ===== PROFILE SELECT ===== */
.profile-select {
  position: fixed; inset: 0; z-index: 900;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.profile-select.hidden { display: none; }
.profile-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; }
.profiles-grid {
  display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
  max-width: 600px; padding: 0 1rem;
}
.profile-card {
  cursor: pointer; text-align: center; transition: transform 0.2s;
}
.profile-card:hover { transform: scale(1.1); }
.profile-avatar {
  width: 90px; height: 90px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; font-weight: 700; color: #fff;
  margin-bottom: 0.5rem; border: 3px solid transparent;
  transition: border-color 0.2s;
}
.profile-card:hover .profile-avatar { border-color: #fff; }
.profile-name { font-size: 0.85rem; color: #aaa; }

/* ===== PASSWORD MODAL ===== */
.password-modal {
  position: fixed; inset: 0; z-index: 950;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
}
.password-modal.hidden { display: none; }
.password-box {
  background: #1a1a2e; border-radius: 16px; padding: 2rem;
  width: 90%; max-width: 360px; text-align: center;
}
.password-box h3 { margin-bottom: 1rem; font-size: 1.2rem; }
.password-box input {
  width: 100%; padding: 0.75rem 1rem; border-radius: 8px;
  border: 2px solid #333; background: #0d0d1a; color: #fff;
  font-size: 1rem; outline: none; margin-bottom: 0.5rem;
}
.password-box input:focus { border-color: #e50914; }
.password-box .error { color: #e50914; font-size: 0.8rem; min-height: 1.2rem; }
.password-box button {
  width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
  background: #e50914; color: #fff; font-size: 1rem; font-weight: 600;
  cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
}
.password-box button:hover { background: #ff1a25; }
.password-back {
  background: none !important; color: #888 !important; margin-top: 0.5rem;
  font-size: 0.85rem !important;
}
.password-back:hover { color: #fff !important; }

/* ===== MAIN APP ===== */
.app { display: none; }
.app.visible { display: block; }

/* NAV */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 70%, transparent);
  padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem;
  transition: background 0.3s;
}
.navbar.scrolled { background: rgba(10,10,15,0.98); }
.nav-logo {
  font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e50914, #ff6b35);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  flex-shrink: 0;
}
.nav-links { display: flex; gap: 1rem; flex: 1; }
.nav-links a {
  color: #aaa; text-decoration: none; font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: color 0.2s; white-space: nowrap;
}
.nav-links a:hover, .nav-links a.active { color: #fff; }
.nav-right { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
.search-box {
  display: flex; align-items: center; background: transparent;
  border: 2px solid transparent; border-radius: 8px; overflow: hidden;
  transition: all 0.3s;
}
.search-box.open { background: #1a1a2e; border-color: #444; }
.search-icon { padding: 0.5rem; cursor: pointer; color: #aaa; font-size: 1.1rem; }
.search-input {
  width: 0; border: none; background: transparent; color: #fff;
  font-size: 0.9rem; outline: none; transition: width 0.3s;
}
.search-box.open .search-input { width: 180px; padding: 0.5rem 0.5rem 0.5rem 0; }
.nav-profile {
  width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; color: #fff;
}
.nav-profile-dropdown {
  position: absolute; top: 100%; right: 0; background: #1a1a2e;
  border-radius: 8px; padding: 0.5rem 0; min-width: 160px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: none;
}
.nav-profile-wrapper { position: relative; }
.nav-profile-wrapper:hover .nav-profile-dropdown { display: block; }
.nav-profile-dropdown a {
  display: block; padding: 0.5rem 1rem; color: #ccc; font-size: 0.85rem;
  text-decoration: none; cursor: pointer;
}
.nav-profile-dropdown a:hover { background: #252540; color: #fff; }

/* HERO / FEATURED */
.hero {
  position: relative; height: 70vh; min-height: 400px; max-height: 600px;
  overflow: hidden; margin-bottom: 1rem;
}
.hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a0a2e, #0a1a3e, #1a2a1e);
  display: flex; align-items: center; justify-content: center;
}
.hero-bg img {
  width: 100%; height: 100%; object-fit: cover;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, #0a0a0f 0%, transparent 50%, rgba(10,10,15,0.4) 100%);
}
.hero-content {
  position: absolute; bottom: 15%; left: 5%; max-width: 500px; z-index: 2;
}
.hero-content h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.1; }
.hero-content p { color: #bbb; font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.hero-buttons { display: flex; gap: 0.75rem; }
.btn-play, .btn-info {
  padding: 0.6rem 1.5rem; border: none; border-radius: 6px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 0.4rem; transition: all 0.2s;
}
.btn-play { background: #fff; color: #000; }
.btn-play:hover { background: #ddd; }
.btn-info { background: rgba(255,255,255,0.2); color: #fff; }
.btn-info:hover { background: rgba(255,255,255,0.3); }

/* ROWS */
.content-area { padding: 0 4%; }
.row { margin-bottom: 2rem; }
.row-title {
  font-size: 1.2rem; font-weight: 700; margin-bottom: 0.75rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.row-title .see-all {
  font-size: 0.8rem; color: #e50914; cursor: pointer; font-weight: 500;
}
.row-scroll {
  display: flex; gap: 0.6rem; overflow-x: auto; scroll-snap-type: x mandatory;
  padding-bottom: 0.5rem; -ms-overflow-style: none; scrollbar-width: none;
}
.row-scroll::-webkit-scrollbar { display: none; }

/* MOVIE CARD */
.movie-card {
  flex: 0 0 auto; width: 160px; scroll-snap-align: start;
  cursor: pointer; position: relative; border-radius: 8px;
  overflow: hidden; transition: transform 0.25s, box-shadow 0.25s;
}
.movie-card:hover { transform: scale(1.08); z-index: 5; box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
.movie-poster {
  width: 100%; aspect-ratio: 2/3; object-fit: cover;
  background: #1a1a2e; display: flex; align-items: center; justify-content: center;
}
.movie-poster-placeholder {
  width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1a1a2e, #2a1a3e);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  padding: 0.5rem; text-align: center;
}
.movie-poster-placeholder .emoji { font-size: 2rem; margin-bottom: 0.3rem; }
.movie-poster-placeholder .title { font-size: 0.7rem; color: #aaa; line-height: 1.3; }
.movie-card-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  padding: 2rem 0.5rem 0.5rem;
}
.movie-card-title { font-size: 0.75rem; font-weight: 600; line-height: 1.3; }
.movie-card-meta { font-size: 0.65rem; color: #888; margin-top: 0.15rem; }
.progress-bar {
  height: 3px; background: #333; border-radius: 2px; margin-top: 0.3rem; overflow: hidden;
}
.progress-bar-fill { height: 100%; background: #e50914; border-radius: 2px; }

/* SEARCH RESULTS */
.search-results {
  padding: 5rem 4% 2rem; display: none;
}
.search-results.visible { display: block; }
.search-results-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; }
.search-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.8rem;
}
.search-grid .movie-card { width: 100%; }

/* CATEGORY VIEW */
.category-view { padding: 5rem 4% 2rem; display: none; }
.category-view.visible { display: block; }
.category-view-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }

/* PLAYER */
.player-screen {
  position: fixed; inset: 0; z-index: 800; background: #000;
  display: none; flex-direction: column;
}
.player-screen.visible { display: flex; }
.player-header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem;
  background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
}
.player-back {
  background: none; border: none; color: #fff; font-size: 1.5rem;
  cursor: pointer; padding: 0.25rem;
}
.player-title { font-size: 1rem; font-weight: 600; }
.player-video {
  flex: 1; display: flex; align-items: center; justify-content: center;
}
.player-video video {
  width: 100%; height: 100%; max-height: 100vh; background: #000;
}
.player-placeholder {
  text-align: center; color: #666; padding: 2rem;
}
.player-placeholder .icon { font-size: 4rem; margin-bottom: 1rem; }
.player-placeholder p { font-size: 0.9rem; line-height: 1.6; }
.subtitle-btn {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 0.3rem 0.7rem; border-radius: 4px; font-size: 0.8rem;
  cursor: pointer; margin-left: auto; transition: all 0.2s;
}
.subtitle-btn:hover { background: rgba(255,255,255,0.3); }
.subtitle-btn.active { background: #e50914; border-color: #e50914; }
video::cue {
  background: rgba(0,0,0,0.75); color: #fff; font-size: 1.1rem;
  font-family: 'Inter', sans-serif; padding: 0.2em 0.4em;
  border-radius: 4px;
}

/* MOBILE */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hero { height: 50vh; min-height: 300px; }
  .hero-content h1 { font-size: 1.5rem; }
  .hero-content p { font-size: 0.8rem; -webkit-line-clamp: 2; }
  .hero-content { bottom: 10%; left: 4%; max-width: 70%; }
  .movie-card { width: 120px; }
  .search-box.open .search-input { width: 130px; }
  .content-area { padding: 0 3%; }
  .profiles-grid { gap: 1rem; }
  .profile-avatar { width: 70px; height: 70px; font-size: 1.8rem; }
  .lock-logo { font-size: 2rem; }
  .btn-play, .btn-info { padding: 0.5rem 1rem; font-size: 0.8rem; }
}
@media (max-width: 480px) {
  .movie-card { width: 105px; }
  .row-title { font-size: 1rem; }
  .search-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); }
}

/* MOBILE NAV */
.mobile-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,15,0.95); border-top: 1px solid #222;
  padding: 0.5rem 0; z-index: 100;
  justify-content: space-around;
}
@media (max-width: 768px) { .mobile-nav { display: flex; } .content-area { padding-bottom: 4rem; } }
.mobile-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
  color: #666; font-size: 0.65rem; cursor: pointer; text-decoration: none;
  padding: 0.25rem 0.5rem; transition: color 0.2s;
}
.mobile-nav-item.active { color: #fff; }
.mobile-nav-item .icon { font-size: 1.2rem; }

/* LOADING */
.loading-spinner {
  display: inline-block; width: 30px; height: 30px;
  border: 3px solid #333; border-top-color: #e50914;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<!-- ===== LOCK SCREEN ===== -->

      onfocus="this.style.borderColor='#e50914'" onblur="this.style.borderColor='#333'">
    <div id="masterError" style="color:#e50914;font-size:0.8rem;min-height:1.2rem"></div>
    <button onclick="checkMasterPassword()" style="width:100%;padding:0.75rem;border:none;border-radius:8px;background:#e50914;color:#fff;font-size:1rem;font-weight:600;cursor:pointer">
      Unlock
    </button>
  </div>
</div>

<!-- ===== PROFILE SELECT ===== -->
<div class="profile-select hidden" id="profileSelect">
  <div class="lock-logo" style="margin-bottom:0.25rem">BILAL FLIX</div>
  <div class="profile-title">Who's watching?</div>
  <div class="profiles-grid" id="profilesGrid"></div>
</div>

<!-- ===== PASSWORD MODAL ===== -->
<div class="password-modal hidden" id="passwordModal">
  <div class="password-box">
    <h3 id="passwordModalUser">Enter PIN</h3>
    <input type="password" id="profilePassword" placeholder="Enter your PIN" maxlength="6"
      onkeydown="if(event.key==='Enter')checkProfilePassword()">
    <div class="error" id="profileError"></div>
    <button onclick="checkProfilePassword()">Continue</button>
    <button class="password-back" onclick="closePasswordModal()">Back</button>
  </div>
</div>

<!-- ===== PLAYER ===== -->
<div class="player-screen" id="playerScreen">
  <div class="player-header" id="playerHeader">
    <button class="player-back" onclick="closePlayer()">←</button>
    <span class="player-title" id="playerTitle"></span>
    <button class="subtitle-btn" id="subtitleBtn" onclick="toggleSubtitles()" style="display:none">CC</button>
  </div>
  <div class="player-video" id="playerVideo"></div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="app" id="app">
  <nav class="navbar" id="navbar">
    <div class="nav-logo">BILAL FLIX</div>
    <div class="nav-links" id="navLinks">
      <a onclick="showHome()" class="active" data-nav="home">Home</a>
      <a onclick="showCategory('movies')" data-nav="movies">Movies</a>
      <a onclick="showCategory('series')" data-nav="series">Series</a>
      <a onclick="showCategory('kids')" data-nav="kids">Kids</a>
    </div>
    <div class="nav-right">
      <div class="search-box" id="searchBox">
        <span class="search-icon" onclick="toggleSearch()">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search titles..."
          oninput="handleSearch(this.value)">
      </div>
      <div class="nav-profile-wrapper">
        <div class="nav-profile" id="navAvatar" onclick=""></div>
        <div class="nav-profile-dropdown">
          <a onclick="switchProfile()">Switch Profile</a>
          <a onclick="logout()">Sign Out</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- HOME VIEW -->
  <div id="homeView">
    <div class="hero" id="heroSection"></div>
    <div class="content-area" id="contentRows"></div>
  </div>

  <!-- SEARCH RESULTS -->
  <div class="search-results" id="searchResults">
    <div class="search-results-title" id="searchTitle">Results</div>
    <div class="search-grid" id="searchGrid"></div>
  </div>

  <!-- CATEGORY VIEW -->
  <div class="category-view" id="categoryView">
    <div class="category-view-title" id="categoryTitle"></div>
    <div class="search-grid" id="categoryGrid"></div>
  </div>

  <!-- MOBILE NAV -->
  <div class="mobile-nav">
    <a class="mobile-nav-item active" onclick="showHome()" data-nav="home">
      <span class="icon">🏠</span>Home
    </a>
    <a class="mobile-nav-item" onclick="showCategory('movies')" data-nav="movies">
      <span class="icon">🎬</span>Movies
    </a>
    <a class="mobile-nav-item" onclick="showCategory('series')" data-nav="series">
      <span class="icon">📺</span>Series
    </a>
    <a class="mobile-nav-item" onclick="showCategory('kids')" data-nav="kids">
      <span class="icon">👶</span>Kids
    </a>
    <a class="mobile-nav-item" onclick="toggleSearch()">
      <span class="icon">🔍</span>Search
    </a>
  </div>
</div>

let currentUser = null;
let selectedProfileId = null;

// ── STORAGE HELPERS ──
function getUserData(userId) {
  try { return JSON.parse(localStorage.getItem("flix_" + userId) || "{}"); }
  catch(e) { return {}; }
}
function setUserData(userId, data) {
  localStorage.setItem("flix_" + userId, JSON.stringify(data));
}
function getWatchProgress(userId, movieId) {
  const d = getUserData(userId);
  return (d.progress || {})[movieId] || { time: 0, percent: 0, lastWatched: 0 };
}
function setWatchProgress(userId, movieId, time, percent) {
  const d = getUserData(userId);
  if (!d.progress) d.progress = {};
  d.progress[movieId] = { time: time, percent: percent, lastWatched: Date.now() };
  if (!d.recentlyWatched) d.recentlyWatched = [];
  d.recentlyWatched = [movieId, ...d.recentlyWatched.filter(function(x){return x !== movieId})].slice(0, 20);
  setUserData(userId, d);
}

// ── MASTER PASSWORD ──
function checkMasterPassword() {
  const input = document.getElementById("masterPassword").value;
  if (input === MASTER_PASSWORD) {
    document.getElementById("lockScreen").classList.add("hidden");
    document.getElementById("profileSelect").classList.remove("hidden");
    renderProfiles();
    sessionStorage.setItem("flix_unlocked", "1");
  } else {
    document.getElementById("masterError").textContent = "Incorrect password";
    document.getElementById("masterPassword").value = "";
  }
}
document.getElementById("masterPassword").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkMasterPassword();
});

// Check if already unlocked this session
if (sessionStorage.getItem("flix_unlocked")) {
  document.getElementById("lockScreen").classList.add("hidden");
  const lastUser = sessionStorage.getItem("flix_user");
  if (lastUser) {
    currentUser = PROFILES.find(function(p){return p.id === lastUser});
    if (currentUser) {
      document.getElementById("profileSelect").classList.add("hidden");
      enterApp();
    } else {
      document.getElementById("profileSelect").classList.remove("hidden");
      renderProfiles();
    }
  } else {
    document.getElementById("profileSelect").classList.remove("hidden");
    renderProfiles();
  }
}

// ── PROFILES ──
function renderProfiles() {
  const grid = document.getElementById("profilesGrid");
  grid.innerHTML = PROFILES.map(function(p) {
    return '<div class="profile-card" onclick="selectProfile(\'' + p.id + '\')">' +
      '<div class="profile-avatar" style="background:' + p.color + '">' + p.avatar + '</div>' +
      '<div class="profile-name">' + p.name + '</div></div>';
  }).join("");
}
function selectProfile(id) {
  selectedProfileId = id;
  const profile = PROFILES.find(function(p){return p.id === id});
  document.getElementById("passwordModalUser").textContent = "Enter PIN for " + profile.name;
  document.getElementById("profilePassword").value = "";
  document.getElementById("profileError").textContent = "";
  document.getElementById("passwordModal").classList.remove("hidden");
  setTimeout(function(){ document.getElementById("profilePassword").focus(); }, 100);
}
function checkProfilePassword() {
  const pin = document.getElementById("profilePassword").value;
  const profile = PROFILES.find(function(p){return p.id === selectedProfileId});
  if (pin === profile.pin) {
    currentUser = profile;
    sessionStorage.setItem("flix_user", profile.id);
    document.getElementById("passwordModal").classList.add("hidden");
    document.getElementById("profileSelect").classList.add("hidden");
    enterApp();
  } else {
    document.getElementById("profileError").textContent = "Incorrect PIN";
    document.getElementById("profilePassword").value = "";
  }
}

// ── ENTER APP ──
function enterApp() {
  document.getElementById("app").classList.add("visible");
  document.getElementById("navAvatar").style.background = currentUser.color;
  document.getElementById("navAvatar").textContent = currentUser.avatar;
  showHome();
}

// ── RENDER MOVIE CARD ──
function renderCard(movie) {
  const progress = currentUser ? getWatchProgress(currentUser.id, movie.id) : null;
  const progressBar = (progress && progress.percent > 0) ?
    '<div class="progress-bar"><div class="progress-bar-fill" style="width:' + progress.percent + '%"></div></div>' : '';

  const posterContent = movie.poster ?
    '<img class="movie-poster" src="' + movie.poster + '" alt="' + movie.title + '" loading="lazy" onerror="this.outerHTML=makePlaceholder(\'' + movie.emoji + '\',\'' + movie.title.replace(/'/g,"\\'") + '\')">' :
    makePlaceholder(movie.emoji, movie.title);

  return '<div class="movie-card" onclick="playMovie(\'' + movie.id + '\')">' +
    posterContent +
    '<div class="movie-card-info">' +
    '<div class="movie-card-title">' + movie.title + '</div>' +
    '<div class="movie-card-meta">' + movie.year + ' \u00b7 ' + movie.genre + ' \u00b7 ' + movie.duration + '</div>' +
    progressBar + '</div></div>';
}
function makePlaceholder(emoji, title) {
  return '<div class="movie-poster-placeholder"><span class="emoji">' + emoji + '</span><span class="title">' + title + '</span></div>';
}

function renderRows() {
  const container = document.getElementById("contentRows");
  let html = "";

  // Continue Watching
  if (currentUser) {
    const userData = getUserData(currentUser.id);
    const recent = (userData.recentlyWatched || [])
      .map(function(id){ return CATALOG.find(function(m){return m.id === id}); })
      .filter(function(m){ return m && ((userData.progress[m.id] || {}).percent || 0) < 95; });
    if (recent.length > 0) {
      html += '<div class="row"><div class="row-title">Continue Watching for ' + currentUser.name + '</div>' +
        '<div class="row-scroll">' + recent.map(renderCard).join("") + '</div></div>';
    }
  }

  // Recently Added (all, sorted by year)
  const sorted = CATALOG.slice().sort(function(a,b){return b.year - a.year});
  html += '<div class="row"><div class="row-title">Recently Added</div>' +
    '<div class="row-scroll">' + sorted.slice(0,15).map(renderCard).join("") + '</div></div>';

  // By Genre
  const genres = [];
  CATALOG.forEach(function(m){ if (genres.indexOf(m.genre) === -1) genres.push(m.genre); });
  genres.forEach(function(genre) {
    const items = CATALOG.filter(function(m){return m.genre === genre});
    if (items.length > 0) {
      html += '<div class="row"><div class="row-title">' + genre + '</div>' +
        '<div class="row-scroll">' + items.map(renderCard).join("") + '</div></div>';
    }
  });

  // Movies
  const movies = CATALOG.filter(function(m){return m.category === "movies"});
  if (movies.length > 0) {
    html += '<div class="row"><div class="row-title">All Movies</div>' +
      '<div class="row-scroll">' + movies.map(renderCard).join("") + '</div></div>';
  }

  // Series
  const series = CATALOG.filter(function(m){return m.category === "series"});
  if (series.length > 0) {
    html += '<div class="row"><div class="row-title">TV Series</div>' +
      '<div class="row-scroll">' + series.map(renderCard).join("") + '</div></div>';
  }

  container.innerHTML = html;
}

function handleSearch(query) {
  if (!query || query.length < 2) { showHome(); return; }
  const q = query.toLowerCase();
  const results = CATALOG.filter(function(m) {
    return m.title.toLowerCase().indexOf(q) !== -1 ||
      m.genre.toLowerCase().indexOf(q) !== -1 ||
      m.category.toLowerCase().indexOf(q) !== -1 ||
      m.desc.toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById("homeView").style.display = "none";
  document.getElementById("categoryView").classList.remove("visible");
  document.getElementById("searchResults").classList.add("visible");
  document.getElementById("searchTitle").textContent =
    results.length > 0 ? 'Results for "' + query + '"' : 'No results for "' + query + '"';
  document.getElementById("searchGrid").innerHTML = results.map(renderCard).join("");
}

}

// ── PLAYER ──
let playerInterval = null;

// Convert SRT subtitle text to WebVTT format
function srtToVtt(srt) {
  var vtt = "WEBVTT\n\n";
  vtt += srt.replace(/\r\n/g, "\n").replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, "$1.$2");
  return vtt;
}

// Toggle subtitle track on/off
function toggleSubtitles() {
  var video = document.querySelector("#playerVideo video");
  var btn = document.getElementById("subtitleBtn");
  if (!video || !video.textTracks.length) return;
  var track = video.textTracks[0];
  if (track.mode === "showing") {
    track.mode = "hidden";
    btn.classList.remove("active");
  } else {
    track.mode = "showing";
    btn.classList.add("active");
  }
}

// Try loading subtitles from multiple possible paths
function tryLoadSubtitles(video, movie) {
  var subBtn = document.getElementById("subtitleBtn");
  subBtn.style.display = "none";
  var urls = [];
  if (movie.subtitleUrl) urls.push(movie.subtitleUrl);
  if (movie.folderPath) {
    var folder = movie.folderPath;
    var base = folder.split("/").pop();
    urls.push(folder + "/" + base + ".srt");
    urls.push(folder + "/" + base + ".vtt");
    urls.push(folder + "/English.srt");
    urls.push(folder + "/Subs/English.srt");
    urls.push(folder + "/" + base + ".eng.srt");
  }
  function tryNext(i) {
    if (i >= urls.length) return;
    var url = urls[i];
    fetch(url).then(function(resp) {
      if (!resp.ok) { tryNext(i + 1); return; }
      return resp.text();
    }).then(function(text) {
      if (!text) return;
      var vttText = text;
      if (url.endsWith(".srt")) vttText = srtToVtt(text);
      var blob = new Blob([vttText], {type: "text/vtt"});
      var blobUrl = URL.createObjectURL(blob);
      var track = document.createElement("track");
      track.kind = "subtitles";
      track.label = "English";
      track.srclang = "en";
      track.src = blobUrl;
      track.default = true;
      video.appendChild(track);
      subBtn.style.display = "inline-block";
      subBtn.classList.add("active");
      track.addEventListener("load", function() {
        if (video.textTracks.length > 0) video.textTracks[0].mode = "showing";
      });
    }).catch(function() { tryNext(i + 1); });
  }
  if (urls.length > 0) tryNext(0);
}

function playMovie(id) {
  const movie = CATALOG.find(function(m){return m.id === id});
  if (!movie) return;
  document.getElementById("playerScreen").classList.add("visible");
  document.getElementById("playerTitle").textContent = movie.title;
  const progress = currentUser ? getWatchProgress(currentUser.id, id) : null;
  const container = document.getElementById("playerVideo");
  document.getElementById("subtitleBtn").style.display = "none";
  document.getElementById("subtitleBtn").classList.remove("active");

  if (movie.videoUrl) {
    const video = document.createElement("video");
    video.controls = true;
    video.autoplay = true;
    video.crossOrigin = "anonymous";
    video.src = movie.videoUrl;
    video.style.cssText = "width:100%;height:100%;background:#000";
    if (progress && progress.time > 0) video.currentTime = progress.time;
    video.addEventListener("loadedmetadata", function() {
      if (progress && progress.time > 0) video.currentTime = progress.time;
    });
    playerInterval = setInterval(function() {
      if (video.duration && currentUser) {
        const pct = (video.currentTime / video.duration) * 100;
        setWatchProgress(currentUser.id, id, video.currentTime, pct);
      }
    }, 5000);
    video.addEventListener("pause", function() {
      if (video.duration && currentUser) {
        const pct = (video.currentTime / video.duration) * 100;
        setWatchProgress(currentUser.id, id, video.currentTime, pct);
      }
    });
    container.innerHTML = "";
    container.appendChild(video);
    tryLoadSubtitles(video, movie);
  } else {
    container.innerHTML = '<div class="player-placeholder">' +
      '<div class="icon">\ud83c\udfac</div>' +
      '<p><strong>' + movie.title + '</strong><br><br>' +
      'No video link configured yet.<br>' +
      'Run <code style="background:#333;padding:2px 6px;border-radius:3px">python setup-local.py</code> to scan &amp; link your movies.</p></div>';
    if (currentUser) setWatchProgress(currentUser.id, id, 0, 1);
  }

  let hideTimeout;
  const header = document.getElementById("playerHeader");
  function showControls() {
    header.style.opacity = "1";
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(function(){ header.style.opacity = "0"; }, 3000);
  }
  document.getElementById("playerScreen").addEventListener("mousemove", showControls);
  document.getElementById("playerScreen").addEventListener("touchstart", showControls);
  showControls();
}
function closePlayer() {
  clearInterval(playerInterval);
  const container = document.getElementById("playerVideo");
  const video = container.querySelector("video");
  if (video) { video.pause(); video.src = ""; }
  container.innerHTML = "";
  document.getElementById("playerScreen").classList.remove("visible");
  if (document.getElementById("homeView").style.display !== "none") renderRows();
}
